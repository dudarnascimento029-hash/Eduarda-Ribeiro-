<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="discription" content="Prazu- Formulário de cadastro">

    <title>Prazu Oficial</title>

    <link rel="stylesheet" href="style/cadastro.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <ul id="menu-principal">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
            <h1>Prazu</h1>
            <p>O aplicativo que deixará seu estoque organizado e sem vencimentos.</p>
        </div>
    </header>

    <main>
        <div class="container">
            <section id="form-cadastro" class="secao-cadastro">
                <h2>Formulário de Cadastro</h2>

                <form id="login-cadastro" action="login.html" method="get">
                    <div class="form-cadastro">
                        <label for="cadastro_nome">Nome completo:</label>
                        <input id="cadastro_nome" type="text" required>
                    </div>

                    <div class="form-cadastro">
                        <label for="cadastro_email">E-mail:</label>
                        <input id="cadastro_email" type="email" required>
                    </div>

                    <div class="form-cadastro">
                        <label for="cadastro_telefone">Telefone:</label>
                        <input id="cadastro_telefone" type="text" required>
                    </div>

                    <div class="form-cadastro">
                        <label for="cadastro_profissão">Profissão:</label>
                        <input id="cadastro_profissão" type="text" required>
                    </div>

                    <div class="form-cadastro">
                        <label for="cadastro_senha">Senha:</label>
                        <input id="cadastro_senha" type="password" required>
                    </div>

                    <div class="form-cadastro">
                        <label for="cadastro_senha_confirm">Confirme a senha:</label>
                        <input id="cadastro_senha_confirm" type="password" required>
                    </div>

                    <div class="form-acoes">
                        <button type="reset" class="botao-padrao-secundario">Limpar</button>
                        <button type="submit" class="botao-padrao">Cadastrar</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Prazu.</p>
        </div>
    </footer>
</body>

</html>
