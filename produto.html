<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Prazu">

    <title>Prazu - Cadastro de Produtos</title>

    <link rel="stylesheet" href="style/principla.css">
    <link rel="stylesheet" href="style/padrao.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <ul id="menu-principal">
                    <li><a href="estoque.html">Estoque</a></li>
                    <li><a href="produto.html">Cadastro de Produtos</a></li>
                    <li><a href="lista-produtos.html">Produtos Cadastrados</a></li>
                    <li><a href="dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
            <h1>Produtos</h1>
            <h2>Cadastre aqui seus Produtos!</h2>
            <p>Adicione e gerencie seus produtos para manter o estoque organizado.</p>
        </div>
    </header>

    <main>
        <div class="container">
            <section id="form-cadastro-produtos" class="secao-cadastro-produtos">
                <h2>Cadastro de Produtos</h2>

                <form id="cadastro-produto" action="lista-produtos.html" method="get">
                    <div class="form-cadastro-produtos">
                        <label for="nome_produto">Nome do Produto:</label>
                        <input id="nome_produto" type="text" required>
                    </div>

                    <div class="form-cadastro-produtos">
                        <label for="categoria">Categoria:</label>
                        <input id="categoria" type="text" required>
                    </div>

                    <button type="submit" class="botao-padrao">Cadastrar</button>
                    <button type="reset" class="botao-padrao-secundario">Limpar</button>

                    <hr>
                    <h2>Cadastro da Nota Fiscal</h2>
                    <div class="form-cadastro-produtos">
                        <label for="cadastro_nota">Número da Nota Fiscal:</label>
                        <input id="cadastro_nota" type="number" required>
                    </div>
                </form>

                <button type="submit" class="botao-padrao">Cadastrar</button>
                <button type="reset" class="botao-padrao-secundario">Limpar</button>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Prazu.</p>
        </div>
    </footer>
</body>
</html>
