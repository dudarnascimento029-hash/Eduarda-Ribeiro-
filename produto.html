<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Prazu</title>
    </head>
    <body>
        <h1>Produtos</h1>
        <h2>Cadastro de Produtos</h2>
        <form>
            <p>
                <label for="nome_produto">Nome do Produto:</label>
                <input id="nome_produto" type="text"
            </p>
            <p>
                <label for="categoria">Categoria:</label>
                <input id="categoria" type="text"
            </p>
            </form>

            <hr>
            <h2>Cadastro da Nota Fiscal</h2>
            <form>
                <p>
                    <label for="cadastro_nota">Número da Nota Fiscal:</label>
                    <input id="cadastro_nota" type="number"
                </p>
            </form>
    </body>
</html>
