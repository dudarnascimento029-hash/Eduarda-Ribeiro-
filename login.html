<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Prazu - Login">

    <title>Login</title>

    <link rel="stylesheet" href="style/login.css">
</head>

<body>
    <header>
        <cabeçalho>
            <div class="cabecalho-login">
                <h1>Prazu</h1>
                <h2>Login</h2>
            </div>
        </cabeçalho>
    </header>

    <main>
        <div class="container">
            <section id="login" class="secao-form secao-login">
                <form id="login-form" action="dashboard.html" method="get">
                    <div class="form-cadastro">
                        <label for="login-email">E-mail:</label>
                        <input id="login-email" 
                        type="e-mail" 
                        name="e-mail" 
                        placeholder="seu@email.com"
                        required
                        >
                    </div>

                    <div class="form cadastro">
                        <label for="login-senha">Senha:</label>
                        <input id="login-senha" 
                        type="password" 
                        name="senha"
                        placeholder="Digite sua senha"
                        required
                        >
                    </div>

                    <div class="form-acoes">
                        <button type="submit" class="botao principal">Entrar</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 Prazu.</p>
        </div>
    </footer>
</body>
</html>
