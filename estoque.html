<!DOCTYPE html>
<html>

                <form id="form-cadastro" action="lista-produtos.html" method="get">

                        <label for="cadastro_entrada">Data de Entrada:</label>
                        <input id="cadastro_entrada" type="text" required>
                    </div>

                    <div class="form-cadastro-validade">
                        <label for="cadastro_validade">Data de Validade:</label>
                        <input id="cadastro_validade" type="text" required>
                    </div>
                </form>
            </section>
        </div>
